<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form page</title>
</head>
<body>
    <section>
      <h2>Personal Information</h2>
      <form action="label">Full Name</form>
      <input type="text">
      <hr>

      <form action="label">Username</form>
      <input type="text">
      <hr>

      <form action="label">Email Address</form>
      <input type="email">
      <hr>

      <form action="label">Phone Number</form>
      <input type="tel">
      <hr>

      <form action="label">Date of Birth</form>
      <input type="date">
      <hr>
    </section>

    <section>
    <h2>Account Information</h2>
    <form action="label">Password</form>
    <input type="password">
    <hr>
    <form action="label">Confirm Password</form>
    <input type="password">
    <hr>
    </section>


    <section>
        <h2>Gender</h2>
        <input type="radio" name="Gender" id="Male" value="Male">
        <label for="Male">Male</label>
        <input type="radio" name="Gender" id="Female" value="Female">
        <label for="Female">Female</label>
        <input type="radio" name="Gender" id="Other" value="Other">
        <label for="Other">Other</label>  

    </section>
    
</body>
</html>
