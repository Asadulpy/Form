<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio type</title>
</head>
<body>
    <form>
        <input type="radio" name="Bangladesh" id="Country" value="Bangladesh">
        <label for="Bangladesh">Bangladesh</label><br>

        <input type="radio" name="India" id="Country" value="India">
        <label for="India">India</label><br>
        <input type="radio" name="Russia" id="Country" value="Russia">     
         <label for="Russia">Russia</label><br>


    </form>
</body>
</html>
